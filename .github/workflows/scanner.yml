name: VN30F1M Scanner

on:
  # Run Mon-Fri at 02:00 UTC (= 09:00 Vietnam time)
  schedule:
    - cron: '0 2 * * 1-5'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to run (seconds). Default=20000 (~5.5h for full session)'
        required: false
        default: '20000'
      combo:
        description: 'Combo preset name'
        required: false
        default: 'D: Trend Confirmation (safest)'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (covers 9:00-14:30 = 5.5h)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DNSE_API_KEY: ${{ secrets.DNSE_API_KEY }}
          DNSE_API_SECRET: ${{ secrets.DNSE_API_SECRET }}
        run: |
          DURATION=${{ github.event.inputs.duration || '20000' }}
          COMBO="${{ github.event.inputs.combo || 'D: Trend Confirmation (safest)' }}"
          timeout $DURATION python scanner.py --interval 30 --combo "$COMBO" || true
